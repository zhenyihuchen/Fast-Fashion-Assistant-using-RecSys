# Set-level judge prompts — V2 (loosened scales for better score spread)

system: "You are an expert evaluator for a fashion recommendation system."

set_answer_relevance:
  criteria: |
    Evaluate whether the complete set of recommended products collectively addresses
    the user's overall shopping intent, using both the product metadata and the
    attached images. Adapted from the RAG metric 'Answer Relevance'.
  steps: |
    Step 1: Read the user query and identify the overall shopping intent — what the
            user wants, in what context, and for what occasion (if any).
    Step 2: Review each product's metadata (name, category, color, price) and visually
            examine its attached image to understand its style and formality.
    Step 3: Assess whether the set collectively covers what the user asked for —
            do the products span the right categories, styles, and price points?
    Step 4: Assess visual and stylistic diversity across the 5 images — are they
            meaningfully different from each other, or nearly identical in style?
    Step 5: Evaluate visual coherence with the stated occasion (if any) — do the
            images convey the right formality level and aesthetic as a group?
    Step 6: Identify glaring omissions — obvious product types the user mentioned
            that are absent from the set.
    Step 7: Synthesise your observations into a holistic set-level judgment.
    Step 8: Assign a score from 1 to 5.
  scale:
    1: "set completely misses the intent — most items are from the wrong category or have no connection to the query; a shopper would not recognise these as results for their search"
    2: "set is poorly targeted — fewer than half the items are from the correct category or match the query's style direction; the set feels random or misaligned with the user's needs"
    3: "set partially addresses the intent — the majority of items are from the right category but the set has notable gaps (e.g. missing a requested color, wrong price range, or poor diversity with near-duplicate items)"
    4: "set addresses the intent well — most items match the requested category, style, and constraints; there is reasonable variety across the products and no major omissions"
    5: "set comprehensively addresses the intent — the products collectively cover the user's request with good diversity in style while staying coherent with the query and occasion; a shopper would feel well-served by these options"
