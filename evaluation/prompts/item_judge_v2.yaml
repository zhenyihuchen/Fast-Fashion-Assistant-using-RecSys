# Item-level judge prompts — V2 (loosened scales for better score spread)

system: "You are an expert evaluator for a fashion recommendation system."

item_relevance:
  criteria: |
    Evaluate whether the recommended fashion product is relevant to the user's
    search query. Adapted from the RAG metric 'Context Relevance': checks if the
    retrieved item aligns with what the user was looking for.
  steps: |
    Step 1: Read the user query and identify what the user is looking for:
            item type, color, fit, price range.
    Step 2: Check if the product category matches what the user requested.
    Step 3: Check if the product color aligns with any color specified in the query.
    Step 4: Check if the product fit or style matches any fit preference mentioned.
    Step 5: Check if the price is within any stated price range.
    Step 6: Consider the overall semantic alignment between the query intent and
            the product name and description. Also examine the attached image.
    Step 7: Assign a score from 1 to 5.
  scale:
    1: "completely irrelevant — wrong product category entirely (e.g. returning a coat when the user asked for a dress), no overlap with the query's intent whatsoever"
    2: "wrong category or completely wrong style direction — the product may share one superficial trait (e.g. same color) but the category, fit, or purpose is fundamentally different from what was requested"
    3: "correct category but misses color, fit, or price — the product is the right type of garment but fails on one or more specific constraints the user stated; a shopper would consider it a weak match"
    4: "correct category and general style direction with minor mismatches on secondary constraints — e.g. slightly above price range, close but not exact color shade, or fit not explicitly matching but visually reasonable"
    5: "matches the main constraints (correct category plus correct color or correct fit) and overall intent — a shopper would recognise this as a good recommendation for their query"

occasion_appropriateness:
  criteria: |
    Evaluate whether the recommended product is visually and contextually appropriate
    for the stated occasion, using both the attached product image and its metadata.
    If no occasion is specified in the evidence, output null for this dimension.
  steps: |
    Step 1: Check the evidence for an occasion_target. If absent or null, skip and
            return null score with reasoning "No occasion specified".
    Step 2: Identify the stated occasion (e.g. wedding, job interview, date night,
            festival, New Year's Eve).
    Step 3: Consider what clothing styles, formality levels, and aesthetics are
            typical and expected for this occasion.
    Step 4: Examine the attached product image — assess its visual style, formality
            level, silhouette, and overall aesthetic.
    Step 5: Review the product metadata (category, name, color) to further understand
            the item beyond what the image shows.
    Step 6: Determine whether a person attending this occasion would realistically
            and comfortably wear this item.
    Step 7: Assign a score from 1 to 5.
  scale:
    1: "completely inappropriate — the item contradicts the occasion's dress code entirely (e.g. casual sportswear for a wedding, swimwear for a job interview); no one would consider wearing this"
    2: "wrong formality or aesthetic — the item belongs to a clearly different dress code level (e.g. a casual hoodie for a formal dinner, gym leggings for a business meeting); even if it is a nice item on its own, it does not fit this occasion"
    3: "neutral — the item does not clash with the occasion but shows no particular awareness of it; a generic safe choice that could work anywhere (e.g. plain black trousers for a festival, a basic t-shirt for a date night)"
    4: "appropriate — correct formality level and generally suitable style for the occasion; a person could comfortably attend wearing this item without feeling out of place"
    5: "well suited — the item clearly fits the occasion's expected style, formality, and aesthetic; a shopper looking for this occasion would consider it a strong choice"

explanation_quality:
  criteria: |
    Evaluate whether the generated product explanation is both grounded in the
    actual product metadata (no hallucinated attributes) and genuinely useful for
    a shopper making a purchase decision. Adapted from the RAG metric 'Groundedness'.
  steps: |
    Step 1: Read the product metadata: name, category, color, price, and description.
    Step 2: Read the user query and the stated occasion (if any).
    Step 3: Read the generated explanation.
    Step 4: For each claim in the explanation, verify it can be directly confirmed
            from the metadata — flag any attributes NOT in the metadata as hallucinations.
    Step 5: Assess whether the explanation is specific — does it mention concrete
            product attributes, or is it generic praise that could apply to any item?
    Step 6: Assess whether the explanation connects the product to the user's query
            and/or occasion with clear, logical reasoning.
    Step 7: Penalise both hallucinated claims and generic filler statements.
    Step 8: Assign a score from 1 to 5.
  scale:
    1: "hallucinated or completely generic — contains fabricated attributes not in the metadata (e.g. inventing a fabric, material, or feature that does not exist), or is so vague it could describe any product ('great item for you')"
    2: "significant issues — either contains at least one hallucinated claim stated as fact (e.g. wrong color or material), or is entirely generic filler with no reference to specific product details"
    3: "grounded but shallow — all claims are factually correct based on metadata, but the explanation merely restates product attributes without connecting them to the user's query or explaining why this product is a good match"
    4: "grounded and useful — no hallucinations, references specific product attributes (name, color, category, price), and explains why the product fits the user's query; a shopper would find it helpful"
    5: "grounded, specific, and connects to intent — every claim is verified against metadata, clearly explains the product-to-query fit, and if an occasion is present, mentions why the item suits it; reads as a thoughtful recommendation rather than a generic description"
